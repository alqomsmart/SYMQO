<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MA AL QOMARIYAH | Absensi Premium</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#204258">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'teal-luxury': '#204258', // Biru Baja Logo
                        'teal-main': '#204258',   // Biru Baja Logo
                        'gold-luxury': '#b89442', // Emas Logo
                        'gold-accent': '#b89442'  // Emas Logo
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '3.5rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-sidebar { background: rgba(32, 66, 88, 0.98); backdrop-filter: blur(10px); }
        .gold-gradient { background: linear-gradient(135deg, #a17d35 0%, #d4b46c 100%); }
        .teal-gradient { background: linear-gradient(135deg, #183344 0%, #204258 100%); }
        .tosca-gradient { background: linear-gradient(135deg, #183344 0%, #204258 100%); }
        .sidebar-active { background: #b89442; color: #ffffff !important; box-shadow: 0 10px 20px rgba(184, 148, 66, 0.3); }
        .card-elegant { border: 1px solid rgba(32, 66, 88, 0.1); transition: all 0.3s ease; }
        .card-elegant:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #b89442; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-hidden">
    
    <!-- HALAMAN LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[300] bg-slate-50 flex items-center justify-center transition-all duration-500">
        <div class="absolute inset-0 teal-gradient opacity-10"></div>
        <div class="bg-white w-full max-w-md p-10 md:p-12 rounded-[3rem] shadow-2xl border border-slate-100 relative z-10 mx-4">
            <div class="text-center mb-10">
                <div class="w-24 h-24 mx-auto bg-white rounded-full p-1 border-2 border-gold-accent shadow-xl mb-6 relative overflow-hidden">
                    <img src="alqomlogo.png" alt="Logo" class="w-full h-full object-contain rounded-full" onerror="this.src='https://jmtyhlpnzposejasobcv.supabase.co/storage/v1/object/public/logo/logo%20alqom%20baru.png'">
                </div>
                <h1 class="text-[10px] font-black uppercase tracking-[0.4em] text-gold-luxury mb-2">SYSTEM INFORMASI</h1>
                <h2 class="text-2xl font-black text-teal-luxury uppercase tracking-tighter">QOMARIAH ONLINE</h2>
            </div>
            
            <form onsubmit="window.handleLogin(event)" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Email Admin</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-5 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="email" id="login-email" required placeholder="admin@sekolah.com" class="w-full py-4 pl-14 pr-5 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-teal-main focus:bg-white transition-all text-slate-700">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block ml-2">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-5 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" class="w-full py-4 pl-14 pr-5 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-teal-main focus:bg-white transition-all text-slate-700">
                    </div>
                </div>
                <button type="submit" id="login-btn" class="w-full py-5 teal-gradient text-white rounded-2xl font-black uppercase tracking-widest shadow-[0_10px_20px_rgba(32,66,88,0.3)] hover:scale-105 active:scale-95 transition-all mt-4 flex justify-center items-center gap-2">
                    Masuk <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="sidebar-overlay" onclick="window.toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 z-[45] hidden backdrop-blur-sm"></div>

    <div id="app" class="flex h-screen w-full overflow-hidden opacity-0 pointer-events-none transition-opacity duration-500">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-80 glass-sidebar text-white fixed md:relative h-full z-50 flex flex-col shrink-0 shadow-2xl border-r border-gold-luxury/20 transition-transform -translate-x-full md:translate-x-0">
            <div class="p-10 border-b border-white/5 text-center">
                <div class="relative inline-block">
                    <div class="absolute inset-0 gold-gradient blur-xl opacity-30 rounded-full"></div>
                    <div class="relative p-2 bg-white rounded-full shadow-2xl border-2 border-gold-accent mb-6 overflow-hidden">
                        <img src="alqomlogo.png" alt="Logo" class="w-24 h-24 object-contain rounded-full" onerror="this.src='https://jmtyhlpnzposejasobcv.supabase.co/storage/v1/object/public/logo/logo%20alqom%20baru.png'">
                    </div>
                </div>
                <h1 class="text-[11px] font-black uppercase tracking-[0.4em] text-gold-accent mb-1">MA Al Qomariyah</h1>
                <p class="text-xl font-light tracking-tighter">ABSENSI <span class="font-black text-gold-accent">ONLINE</span></p>
            </div>
            
            <nav class="flex-1 p-8 space-y-3 overflow-y-auto custom-scroll" id="nav-links"></nav>
            
            <div class="p-8 border-t border-white/5 space-y-4">
                <button onclick="window.handleLogout()" class="w-full py-4 bg-rose-500/10 text-rose-300 border border-rose-500/20 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center gap-3">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Keluar Aplikasi
                </button>
                <div class="bg-white/5 border border-white/10 p-4 rounded-3xl flex items-center gap-4">
                    <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-500 shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                    <span id="status-text" class="text-[10px] font-black uppercase tracking-widest text-white/50">Offline</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden">
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-6 flex justify-between items-center shrink-0 z-40">
                <div class="flex items-center gap-6">
                    <button onclick="window.toggleMobileMenu()" class="md:hidden p-3 bg-teal-50 text-teal-main rounded-2xl">
                        <i data-lucide="menu"></i>
                    </button>
                    <div>
                        <h2 id="page-title" class="text-[10px] font-black text-teal-luxury/40 uppercase tracking-[0.3em]">Dashboard</h2>
                        <p class="text-sm font-medium text-slate-400" id="current-date-display"></p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:block text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Server Time</p>
                        <p id="digital-clock-mini" class="font-bold text-teal-main"></p>
                    </div>
                    <button onclick="window.fetchData()" class="p-4 bg-[#204258] text-white rounded-2xl shadow-lg hover:rotate-180 transition-all duration-500">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <div id="content" class="flex-1 overflow-y-auto p-6 md:p-12 custom-scroll bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:20px_20px]">
                <!-- Konten akan dirender di sini -->
            </div>
        </main>
    </div>

    <!-- MODAL PREMIUM -->
    <div id="modal" class="fixed inset-0 z-[100] bg-teal-luxury/80 backdrop-blur-md hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-2xl rounded-5xl shadow-[0_35px_60px_-15px_rgba(0,0,0,0.3)] overflow-hidden border border-white/20 transform transition-all">
            <div class="p-8 teal-gradient text-white flex justify-between items-center border-b border-gold-luxury/20">
                <h3 id="modal-title" class="text-xl font-black uppercase tracking-tighter italic">Form Entry</h3>
                <button onclick="window.closeModal()" class="p-3 hover:bg-gold-accent hover:text-white rounded-full transition-all"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-10 max-h-[70vh] overflow-y-auto custom-scroll bg-white"></div>
        </div>
    </div>

    <div id="notification-container" class="fixed bottom-6 right-6 left-6 md:left-auto z-[200] flex flex-col gap-3"></div>
    <div id="qr-hidden-container" class="hidden"></div>
    <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls" onchange="window.handleExcelImport(event)">

    <script type="module">
        const SUPABASE_URL = 'https://rjsljqmfvpkxruqpiazq.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_RFf_E-wMy11CpcnamArZwg_Sy8tgWq3';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const JABATAN = ["Guru", "Tendik", "Kepala Madrasah", "Wakamad Kesiswaan", "Wakamad Kurikulum", "Administrasi", "Lainnya"];
        const MAPEL = ["Aqidah Akhlaq", "Qur'an Hadits", "Bahasa Arab", "Bahasa Inggris", "Bahasa Indonesia", "Bahasa Sunda", "Matematika", "Kimia", "TIK", "Sejarah Umum", "Sejarah Kebudayaan Islam (SKI)", "Ekonomi & Akuntansi", "Biologi", "Sosiologi", "Penjasorkes", "Seni Budaya", "Lainnya"];

        const state = {
            session: null,
            currentPage: 'dashboard', classes: [], students: [], teachers: [], attendance: [],
            journals: [], achievements: [], isLoading: true, isMenuOpen: false,
            absensiType: 'manual', manualMode: 'check_in', selectedClass: '', scanner: null,
            isScannerTransitioning: false, // Menambahkan state pengunci transisi kamera
            settings: { check_in_start: '06:00', check_in_end: '08:00', check_out_start: '14:00', check_out_end: '17:00' },
            rekapMonth: '', rekapYear: '', rekapClass: '', rekapData: []
        };

        const pages = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'classes', label: 'Manajemen Kelas', icon: 'layers' },
            { id: 'teachers', label: 'Data Guru MA', icon: 'user-cog' },
            { id: 'students', label: 'Data Siswa', icon: 'users' },
            { id: 'attendance', label: 'Sistem Absensi', icon: 'user-check' },
            { id: 'rekap', label: 'Rekap Absensi', icon: 'calendar-days' },
            { id: 'journals', label: 'Jurnal KBM', icon: 'book-open' },
            { id: 'achievements', label: 'Prestasi Siswa', icon: 'award' },
            { id: 'settings', label: 'Pengaturan', icon: 'settings' }
        ];

        supabase.auth.getSession().then(({ data: { session } }) => {
            state.session = session;
            checkAuth();
        });

        supabase.auth.onAuthStateChange((_event, session) => {
            state.session = session;
            checkAuth();
        });

        function checkAuth() {
            const loginScreen = document.getElementById('login-screen');
            const appLayout = document.getElementById('app');
            
            if (state.session) {
                loginScreen.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => loginScreen.classList.add('hidden'), 500);
                
                appLayout.classList.remove('hidden');
                setTimeout(() => appLayout.classList.remove('opacity-0', 'pointer-events-none'), 50);
                
                window.fetchData(); 
            } else {
                appLayout.classList.add('opacity-0', 'pointer-events-none');
                loginScreen.classList.remove('hidden');
                setTimeout(() => loginScreen.classList.remove('opacity-0', 'pointer-events-none'), 50);
            }
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white border-t-transparent animate-spin rounded-full"></div> Memproses...`;
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                window.notify("Login Gagal: Email atau Password salah.", "error");
                btn.innerHTML = `Masuk <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                lucide.createIcons();
            } else {
                btn.innerHTML = `Berhasil!`;
            }
        };

        window.handleLogout = async () => {
            const { error } = await supabase.auth.signOut();
            if(error) window.notify("Gagal logout.", "error");
        };

        window.startDigitalClock = () => {
            setInterval(() => {
                const clockEl = document.getElementById('digital-clock');
                const dateEl = document.getElementById('digital-date');
                const clockMini = document.getElementById('digital-clock-mini');
                if (clockEl) clockEl.innerText = new Date().toLocaleTimeString('id-ID', { hour12: false });
                if (dateEl) dateEl.innerText = new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date());
                if (clockMini) clockMini.innerText = new Date().toLocaleTimeString('id-ID', { hour12: false });
            }, 1000);
        };

        window.fetchData = async () => {
            state.isLoading = true; render();
            try {
                const today = new Date().toISOString().split('T')[0];
                const [cl, st, tc, att, jr, ach, sett] = await Promise.all([
                    supabase.from('classes').select('*').order('name'),
                    supabase.from('students').select('*, classes(name)').order('name'),
                    supabase.from('teachers').select('*').order('name'),
                    supabase.from('attendance').select('*').eq('date', today),
                    supabase.from('journals').select('*, classes(name)').order('created_at', { ascending: false }),
                    supabase.from('achievements').select('*, students(name)').order('created_at', { ascending: false }),
                    supabase.from('settings').select('*')
                ]);
                state.classes = cl.data || [];
                state.students = st.data || [];
                state.teachers = tc.data || [];
                state.attendance = att.data || [];
                state.journals = jr.data || [];
                state.achievements = ach.data || [];
                if (sett.data) sett.data.forEach(s => state.settings[s.key] = s.value);
                
                const dot = document.getElementById('status-dot');
                if(dot) dot.className = 'w-3 h-3 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_10px_rgba(52,211,153,0.8)]';
                const txt = document.getElementById('status-text');
                if(txt) { txt.innerText = 'Online'; txt.classList.replace('text-white/50', 'text-emerald-400'); }
            } catch (e) { console.error(e); window.notify("Koneksi Gagal", "error");
            } finally { state.isLoading = false; render(); }
        };

        window.navigate = async (p) => {
            if (state.isMenuOpen) window.toggleMobileMenu();
            if (state.scanner) {
                try { if (state.scanner.getState() === 2) await state.scanner.stop(); } catch(e){} finally { state.scanner = null; }
            }
            state.currentPage = p; render();
        };

        window.toggleMobileMenu = () => {
            state.isMenuOpen = !state.isMenuOpen;
            if (state.isMenuOpen) {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
            } else {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }
            document.getElementById('sidebar-overlay').classList.toggle('hidden', !state.isMenuOpen);
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.notify = (msg, type = 'success') => {
            const container = document.getElementById('notification-container');
            const el = document.createElement('div');
            el.className = `p-5 rounded-2xl text-white font-bold text-xs uppercase tracking-widest shadow-2xl flex items-center gap-3 transition-all transform translate-y-10 opacity-0 ${type === 'success' ? 'bg-[#204258]' : 'bg-rose-500'}`;
            el.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(el);
            setTimeout(() => el.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { el.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => el.remove(), 500); }, 3000);
            lucide.createIcons();
        };

        window.toggleScanner = async () => {
            const btn = document.getElementById('scan-btn');
            
            // 1. Kunci eksekusi agar tidak ada klik ganda atau tabrakan state
            if (state.isScannerTransitioning) return;
            state.isScannerTransitioning = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin mx-auto text-white/50"></i>`;
            lucide.createIcons();

            try {
                // 2. LOGIKA MATIKAN KAMERA
                if (state.scanner) { 
                    if (state.scanner.getState() === 2) { // 2 = SCANNING
                        await state.scanner.stop(); 
                    }
                    state.scanner.clear(); 
                    state.scanner = null; 
                    btn.innerText = "Aktifkan Kamera"; 
                    state.isScannerTransitioning = false;
                    return; 
                }

                // 3. INISIALISASI KAMERA BARU
                state.scanner = new Html5Qrcode("reader");

                const onScanSuccess = (decodedText) => {
                    if (state.isScannerTransitioning) return;

                    const s = state.students.find(x => x.nisn === decodedText);
                    if (s) { 
                        window.markAttendance(s.id, 'Hadir'); 
                        window.notify(`Scan Berhasil: ${s.name}`); 
                        
                        // Kunci fungsi scan agar tidak membaca ulang
                        state.isScannerTransitioning = true;
                        btn.innerHTML = `<i data-lucide="loader" class="w-5 h-5 animate-spin mx-auto text-white/50"></i>`;
                        lucide.createIcons();

                        // 4. TUTUP AMAN DENGAN TIMEOUT
                        // Memberi jeda 500ms agar html5-qrcode menyelesaikan proses internal frame-nya
                        setTimeout(async () => {
                            try {
                                if (state.scanner && state.scanner.getState() === 2) {
                                    await state.scanner.stop();
                                    state.scanner.clear();
                                }
                            } catch (e) {
                                 console.error("Gagal menutup otomatis:", e);
                            } finally {
                                state.scanner = null;
                                btn.innerText = "Aktifkan Kamera";
                                state.isScannerTransitioning = false;
                            }
                        }, 500);

                    } else {
                        // Jika QR salah, jeda 2 detik sebelum bisa scan ulang
                        state.isScannerTransitioning = true;
                        window.notify("Data Siswa Tidak Dikenali", "error");
                        setTimeout(() => { state.isScannerTransitioning = false; }, 2000);
                    }
                };

                // 5. Konfigurasi Scanner
                const config = { 
                    fps: 5, // Cukup responsif namun tidak membebani memori
                    qrbox: { width: 250, height: 250 }, 
                    aspectRatio: 1.0,
                    disableFlip: false 
                };

                await state.scanner.start({ facingMode: "environment" }, config, onScanSuccess);
                btn.innerText = "Matikan Kamera";

            } catch (err) { 
                console.error("Kamera error:", err);
                window.notify("Kamera ditolak / Gagal akses", "error");
                if(state.scanner) {
                    try { state.scanner.clear(); } catch(e){}
                    state.scanner = null;
                }
                btn.innerText = "Aktifkan Kamera";
            } finally {
                // Pastikan gembok terbuka jika gagal menyala di tengah jalan
                if (!state.scanner || (state.scanner && state.scanner.getState() === 2)) {
                    state.isScannerTransitioning = false;
                }
            }
        };

        window.setAbsensiType = (v) => { state.absensiType = v; render(); };
        window.setManualMode = (v) => { state.manualMode = v; render(); };
        window.setSelectedClass = (v) => { state.selectedClass = v; render(); };

        window.saveClass = async () => {
            const n = document.getElementById('m-cl-name').value.trim();
            if(!n) return;
            const { error } = await supabase.from('classes').insert([{ name: n }]);
            if (!error) { window.notify("Kelas Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.saveTeacher = async () => {
            const payload = { 
                name: document.getElementById('t-name').value, 
                position: document.getElementById('t-pos').value,
                subject: document.getElementById('t-mapel').value
            };
            const { error } = await supabase.from('teachers').insert([payload]);
            if (!error) { window.notify("Guru Berhasil Ditambah"); window.closeModal(); await window.fetchData(); }
        };

        window.saveStudent = async () => {
            const payload = { 
                name: document.getElementById('m-st-name').value, nisn: document.getElementById('m-st-nisn').value, 
                class_id: document.getElementById('m-st-cl').value, gender: document.getElementById('m-st-gn').value,
                parent_phone: document.getElementById('m-st-ph').value 
            };
            const { error } = await supabase.from('students').insert([payload]);
            if (!error) { window.notify("Siswa Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.updateStudent = async (id) => {
            const payload = {
                name: document.getElementById('e-st-name').value, nisn: document.getElementById('e-st-nisn').value,
                class_id: document.getElementById('e-st-cl').value, gender: document.getElementById('e-st-gn').value,
                parent_phone: document.getElementById('e-st-ph').value
            };
            const { error } = await supabase.from('students').update(payload).eq('id', id);
            if (!error) { window.notify("Data Diperbarui"); window.closeModal(); await window.fetchData(); }
        };

        window.saveJournal = async () => {
            const payload = {
                teacher_name: document.getElementById('j-teacher').value, subject: document.getElementById('j-subject').value,
                class_id: document.getElementById('j-class').value, date: document.getElementById('j-date').value,
                meeting_number: document.getElementById('j-meeting').value, topic: document.getElementById('j-topic').value,
                activity: document.getElementById('j-activity').value, absent_notes: document.getElementById('j-absent').value
            };
            const { error } = await supabase.from('journals').insert([payload]);
            if (!error) { window.notify("Jurnal Berhasil Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.saveAchievement = async () => {
            const payload = {
                student_id: document.getElementById('a-student').value, title: document.getElementById('a-title').value,
                description: document.getElementById('a-desc').value
            };
            const { error } = await supabase.from('achievements').insert([payload]);
            if (!error) { window.notify("Prestasi Berhasil Disimpan"); window.closeModal(); await window.fetchData(); }
        };

        window.deleteData = async (table, id) => {
            const { error } = await supabase.from(table).delete().eq('id', id);
            if (!error) { window.notify("Data Telah Dihapus"); await window.fetchData(); }
            else { window.notify("Gagal menghapus data", "error"); }

        window.updateSettings = async () => {
            const sets = [
                { key: 'check_in_start', value: document.getElementById('s-in-s').value },
                { key: 'check_in_end', value: document.getElementById('s-in-e').value },
                { key: 'check_out_start', value: document.getElementById('s-out-s').value },
                { key: 'check_out_end', value: document.getElementById('s-out-e').value }
            ];
            const { error } = await supabase.from('settings').upsert(sets, { onConflict: 'key' });
            if (!error) window.notify("Pengaturan Diperbarui");
        };

        window.markAttendance = async (sid, status, notes = null) => {
            const today = new Date().toISOString().split('T')[0];
            const existing = state.attendance.find(a => a.student_id === sid);
            const payload = { student_id: sid, date: today, status: status || existing?.status || 'Hadir' };
            if (notes !== null) payload.notes = notes;
            const now = new Date().toISOString();
            if (state.manualMode === 'check_in') payload.check_in = existing?.check_in || now;
            else payload.check_out = existing?.check_out || now;
            const { error } = await supabase.from('attendance').upsert(payload, { onConflict: 'student_id,date' });
            if (!error) { await window.fetchData(); window.notify("Absensi Tersimpan"); }
        };

        window.sendWA = (name, phone, status, notes) => {
            if (!phone || phone === "null" || phone === "") return window.notify("Nomor WA Orang Tua Kosong", "error");
            const session = state.manualMode === 'check_in' ? 'MASUK' : 'PULANG';
            const msg = `*LAPORAN ABSENSI SISWA*\n\nAnanda: *${name}*\nSesi: *${session}*\nStatus: *${status.toUpperCase()}*\nTanggal: ${new Intl.DateTimeFormat('id-ID', { dateStyle: 'full' }).format(new Date())}\n${notes ? '_Catatan: ' + notes + '_' : ''}\n\nTerima kasih.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.downloadQR = (nisn, name) => {
            const container = document.getElementById('qr-hidden-container'); container.innerHTML = '';
            new QRCode(container, { text: nisn, width: 300, height: 300 });
            setTimeout(() => {
                const img = container.querySelector('img'); const link = document.createElement('a');
                link.download = `QR_${name}.png`; link.href = img.src; link.click();
            }, 500);
        };

        window.handleExcelImport = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);
                let count = 0;
                for (const row of rows) {
                    const cl = state.classes.find(c => c.name.toLowerCase() === (row['Kelas'] || '').toLowerCase());
                    if (cl && row['Nama'] && row['NISN']) {
                        let nisnStr = row['NISN'].toString();
                        if(nisnStr.startsWith("'")) nisnStr = nisnStr.substring(1);
                        let phoneStr = row['No WA'] ? row['No WA'].toString() : '';
                        if(phoneStr.startsWith("'")) phoneStr = phoneStr.substring(1);

                        const payload = {
                            name: row['Nama'], nisn: nisnStr, class_id: cl.id, 
                            gender: row['Jenis Kelamin'] || 'L', parent_phone: phoneStr
                        };
                        const { error } = await supabase.from('students').insert([payload]);
                        if (!error) count++;
                    }
                }
                window.notify(`${count} Siswa Berhasil Diimport`);
                document.getElementById('excel-input').value = ""; 
                await window.fetchData();
            };
            reader.readAsArrayBuffer(file);
        };

        window.fetchRekapData = async () => {
            const m = state.rekapMonth; const y = state.rekapYear;
            if(!m || !y) return window.notify("Pilih bulan dan tahun", "error");
            
            const btn = document.getElementById('btn-tarik-rekap');
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Menarik...`;
            
            const startD = `${y}-${m}-01`;
            const endD = new Date(y, m, 0).toISOString().split('T')[0];
            
            try {
                const { data, error } = await supabase.from('attendance').select('*').gte('date', startD).lte('date', endD);
                if(error) throw error;
                state.rekapData = data || [];
                window.notify(`Berhasil menarik ${state.rekapData.length} data absen`);
                renderRekapTable();
            } catch(e) { window.notify("Gagal menarik data rekap", "error"); }
            finally {
                btn.innerHTML = `<i data-lucide="download-cloud" class="w-4 h-4"></i> Tarik Data`;

        window.exportRekapExcel = () => {
            if(!state.rekapData || state.rekapData.length === 0) return window.notify("Tidak ada data untuk diekspor", "error");
            
            const filteredSt = state.students.filter(s => state.rekapClass === '' || s.class_id === state.rekapClass);
            
            const exportData = filteredSt.map(s => {
                const sAtt = state.rekapData.filter(a => a.student_id === s.id);
                return {
                    "NISN": s.nisn,
                    "Nama Siswa": s.name,
                    "Kelas": s.classes?.name || '-',
                    "Hadir": sAtt.filter(a => a.status === 'Hadir').length,
                    "Sakit": sAtt.filter(a => a.status === 'Sakit').length,
                    "Izin": sAtt.filter(a => a.status === 'Izin').length,
                    "Alpa": sAtt.filter(a => a.status === 'Alpa').length,
                };
            });

            const ws = XLSX.utils.json_to_sheet(exportData);
            const wscols = [ {wch:15}, {wch:30}, {wch:15}, {wch:8}, {wch:8}, {wch:8}, {wch:8} ];
            ws['!cols'] = wscols;

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Absensi");
            
            const clName = state.rekapClass ? state.classes.find(c=>c.id === state.rekapClass)?.name : 'Semua_Kelas';
            const fileName = `Rekap_Absen_${clName}_${state.rekapMonth}_${state.rekapYear}.xlsx`;

            tBody.innerHTML = filteredSt.map(s => {
                const sAtt = state.rekapData.filter(a => a.student_id === s.id);
                const h = sAtt.filter(a => a.status === 'Hadir').length;
                const sk = sAtt.filter(a => a.status === 'Sakit').length;
                const iz = sAtt.filter(a => a.status === 'Izin').length;
                const al = sAtt.filter(a => a.status === 'Alpa').length;
                
                return `<tr>
                    <td class="py-4 border-b border-slate-100"><p class="font-black text-xs uppercase text-slate-800">${s.name}</p><p class="text-[9px] font-bold text-[#b89442] uppercase">${s.classes?.name || '-'} • ${s.nisn}</p></td>
                    <td class="py-4 border-b border-slate-100 text-center"><span class="px-2 py-1 bg-emerald-50 text-emerald-600 rounded-md text-[10px] font-black border border-emerald-100">${h}</span></td>
                    <td class="py-4 border-b border-slate-100 text-center"><span class="px-2 py-1 bg-amber-50 text-amber-600 rounded-md text-[10px] font-black border border-amber-100">${sk}</span></td>
                    <td class="py-4 border-b border-slate-100 text-center"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded-md text-[10px] font-black border border-blue-100">${iz}</span></td>
                    <td class="py-4 border-b border-slate-100 text-center"><span class="px-2 py-1 bg-rose-50 text-rose-600 rounded-md text-[10px] font-black border border-rose-100">${al}</span></td>
                </tr>`;
            }).join('');
        };

        function renderRekap(c) {
            const now = new Date();
            if(!state.rekapMonth) state.rekapMonth = String(now.getMonth() + 1).padStart(2, '0');
            if(!state.rekapYear) state.rekapYear = String(now.getFullYear());
            if(!state.rekapClass) state.rekapClass = '';
            if(!state.rekapData) state.rekapData = [];

            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h3 class="text-lg font-black text-[#204258] uppercase tracking-tighter">Rekapitulasi Absensi</h3>
                    <button onclick="window.exportRekapExcel()" class="px-6 py-3 bg-emerald-500 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-emerald-600 flex items-center gap-2 transition-all"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export ke Excel</button>
                </div>
                
                <div class="bg-slate-50 p-6 rounded-4xl border border-slate-200 mb-8 flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[120px]">
                        <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block ml-1">Bulan</label>
                        <select onchange="state.rekapMonth = this.value" class="w-full p-3 bg-white rounded-xl font-bold border border-slate-200 text-xs text-slate-700 outline-none focus:border-[#204258]">
                            ${Array.from({length: 12}, (_, i) => {
                                const m = String(i + 1).padStart(2, '0');
                                const mName = new Date(2000, i, 1).toLocaleString('id-ID', { month: 'long' });
                                return `<option value="${m}" ${state.rekapMonth === m ? 'selected' : ''}>${mName}</option>`;
                            }).join('')}
                        </select>
                    </div>
                    <div class="flex-1 min-w-[100px]">
                        <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block ml-1">Tahun</label>
                        <select onchange="state.rekapYear = this.value" class="w-full p-3 bg-white rounded-xl font-bold border border-slate-200 text-xs text-slate-700 outline-none focus:border-[#204258]">
                            ${[now.getFullYear()-1, now.getFullYear(), now.getFullYear()+1].map(y => `<option value="${y}" ${state.rekapYear == y ? 'selected' : ''}>${y}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <label class="text-[9px] font-black text-slate-500 uppercase mb-2 block ml-1">Filter Kelas</label>
                        <select onchange="state.rekapClass = this.value; window.renderRekapTable();" class="w-full p-3 bg-white rounded-xl font-bold border border-slate-200 text-xs text-slate-700 outline-none focus:border-[#204258]">
                            <option value="">Semua Kelas</option>
                            ${state.classes.map(cl => `<option value="${cl.id}" ${state.rekapClass === cl.id ? 'selected' : ''}>${cl.name}</option>`).join('')}
                        </select>
                    </div>
                    <button id="btn-tarik-rekap" onclick="window.fetchRekapData()" class="px-8 py-3 bg-[#204258] text-white rounded-xl font-black text-[10px] uppercase shadow-md hover:bg-[#1a3648] flex items-center gap-2 h-[42px]"><i data-lucide="download-cloud" class="w-4 h-4"></i> Tarik Data</button>
                </div>

                <div class="overflow-x-auto custom-scroll">
                    <table class="w-full min-w-[500px]">
                        <thead class="text-left text-[9px] font-black text-slate-400 uppercase tracking-widest border-b-2 border-slate-100">
                            <tr>
                                <th class="pb-4">Identitas Siswa</th>
                                <th class="pb-4 text-center w-16">Hadir</th>
                                <th class="pb-4 text-center w-16">Sakit</th>
                                <th class="pb-4 text-center w-16">Izin</th>
                                <th class="pb-4 text-center w-16">Alpa</th>
                            </tr>
                        </thead>
                        <tbody id="rekap-tbody">
                            <tr><td colspan="5" class="py-10 text-center text-xs font-bold text-slate-400">Silakan klik "Tarik Data" untuk menampilkan rekap.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>`;
            
            if(state.rekapData && state.rekapData.length > 0) {
                setTimeout(window.renderRekapTable, 50);
            }
        }

        function renderJournals(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-8"><h3 class="text-lg font-black text-[#204258] uppercase tracking-tighter">Jurnal Guru</h3><button onclick="window.openAddJournal()" class="px-6 py-3 bg-[#204258] text-white rounded-2xl font-black text-[10px] uppercase shadow-xl hover:bg-[#1a3648]">+ Jurnal</button></div>
                <div class="space-y-4">
                    ${state.journals.map(j => `<div class="p-6 bg-slate-50 rounded-4xl border border-slate-100 flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2"><span class="px-3 py-1 bg-[#204258] text-white text-[8px] font-black rounded-lg uppercase">${new Date(j.date).toLocaleDateString('id-ID')}</span><span class="px-3 py-1 bg-[#b89442] text-white text-[8px] font-black rounded-lg uppercase">#${j.meeting_number}</span></div>
                            <h4 class="font-black text-slate-800 uppercase text-sm">${j.subject}: ${j.topic}</h4>
                            <p class="text-[9px] font-bold text-[#b89442] uppercase mb-4">${j.teacher_name} • ${j.classes?.name}</p>
                            <div class="bg-white p-4 rounded-2xl border border-slate-100"><p class="text-xs text-slate-600 leading-relaxed font-medium">${j.activity}</p></div>
                            ${j.absent_notes ? `<div class="mt-3 p-3 bg-rose-50 rounded-xl border border-rose-100"><p class="text-[8px] font-black text-rose-500 uppercase mb-1">Catatan Absen:</p><p class="text-[10px] text-rose-700 font-bold italic">"${j.absent_notes}"</p></div>` : ''}
                        </div>
                        <button onclick="window.deleteData('journals', '${j.id}')" class="text-rose-400 p-2 ml-4 bg-white rounded-xl shadow-sm border border-slate-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function renderAchievements(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100">
                <div class="flex justify-between items-center mb-8"><h3 class="text-lg font-black text-[#b89442] uppercase tracking-tighter">Prestasi Siswa</h3><button onclick="window.openAddAchievement()" class="px-6 py-3 bg-[#b89442] text-white rounded-2xl font-black text-[10px] uppercase shadow-xl hover:bg-[#9c7d37]">+ Prestasi</button></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    ${state.achievements.map(a => `<div class="p-6 bg-[#fcf9f2] rounded-4xl border border-[#b89442]/20 relative overflow-hidden">
                        <i data-lucide="award" class="absolute -right-5 -bottom-5 w-24 h-24 text-[#b89442]/10"></i>
                        <div class="relative z-10 flex justify-between w-full">
                            <div><p class="font-black text-[#8a6e31] text-sm uppercase">${a.title}</p><p class="text-[9px] font-bold uppercase text-[#b89442] mb-4">${a.students?.name}</p><p class="text-xs text-slate-600 font-medium leading-relaxed">${a.description}</p></div>
                            <button onclick="window.deleteData('achievements', '${a.id}')" class="text-rose-400 p-2 bg-white rounded-xl shadow-sm border border-rose-100 h-fit"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        function renderSettings(c) {
            c.innerHTML = `<div class="bg-white p-8 rounded-5xl shadow-xl border border-slate-100 max-w-xl mx-auto">
                <h3 class="text-lg font-black uppercase text-[#204258] mb-8 text-center tracking-widest border-b border-slate-100 pb-4">Pengaturan Jam</h3>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-black text-[#204258] uppercase mb-2 block ml-1">Masuk Mulai</label><input type="time" id="s-in-s" value="${state.settings.check_in_start}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-[#204258]"></div>
                        <div><label class="text-[9px] font-black text-[#204258] uppercase mb-2 block ml-1">Masuk Selesai</label><input type="time" id="s-in-e" value="${state.settings.check_in_end}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-[#204258]"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-black text-[#b89442] uppercase mb-2 block ml-1">Pulang Mulai</label><input type="time" id="s-out-s" value="${state.settings.check_out_start}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-[#b89442]"></div>
                        <div><label class="text-[9px] font-black text-[#b89442] uppercase mb-2 block ml-1">Pulang Selesai</label><input type="time" id="s-out-e" value="${state.settings.check_out_end}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 outline-none focus:border-[#b89442]"></div>
                    </div>
                    <button onclick="window.updateSettings()" class="w-full py-5 bg-[#204258] text-white rounded-3xl font-black uppercase shadow-xl mt-4 hover:bg-[#1a3648] transition-all">Simpan Pengaturan</button>
                </div>
            </div>`;
        }

        window.openAddClass = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Tambah Kelas";
            b.innerHTML = `<div class="space-y-6"><input type="text" id="m-cl-name" placeholder="Contoh: X IPA 1" class="w-full p-5 bg-slate-50 rounded-2xl font-black outline-none border border-slate-200 focus:border-[#204258] uppercase"><button onclick="window.saveClass()" class="w-full py-5 bg-[#204258] text-white rounded-3xl font-black uppercase shadow-xl">Simpan</button></div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddTeacher = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Tambah Guru MA";
            b.innerHTML = `<div class="space-y-4">
                <input type="text" id="t-name" placeholder="Nama Lengkap dengan Gelar" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                <select id="t-pos" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                    ${JABATAN.map(j => `<option value="${j}">${j}</option>`).join('')}
                </select>
                <select id="t-mapel" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                    ${MAPEL.map(m => `<option value="${m}">${m}</option>`).join('')}
                </select>
                <button onclick="window.saveTeacher()" class="w-full py-5 bg-[#204258] text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Guru</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddStudent = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Tambah Siswa";
            b.innerHTML = `<div class="space-y-4">
                <input type="text" id="m-st-name" placeholder="Nama Lengkap Siswa" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258] uppercase">
                <input type="text" id="m-st-nisn" placeholder="NISN (Untuk QR Code)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                <div class="grid grid-cols-2 gap-4">
                    <select id="m-st-cl" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                        ${state.classes.map(cl => `<option value="${cl.id}">${cl.name}</option>`).join('')}
                    </select>
                    <select id="m-st-gn" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                        <option value="L">Laki-laki (L)</option><option value="P">Perempuan (P)</option>
                    </select>
                </div>
                <input type="text" id="m-st-ph" placeholder="No WA Orang Tua (628...)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                <button onclick="window.saveStudent()" class="w-full py-5 bg-[#204258] text-white rounded-3xl font-black uppercase shadow-xl mt-4">Simpan Siswa</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openEditStudent = (id) => {
            const s = state.students.find(x => x.id === id); if (!s) return;
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Edit Data Siswa";
            b.innerHTML = `<div class="space-y-4">
                <input type="text" id="e-st-name" value="${s.name}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258] uppercase">
                <input type="text" id="e-st-nisn" value="${s.nisn}" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                <div class="grid grid-cols-2 gap-4">
                    <select id="e-st-cl" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                        ${state.classes.map(cl => `<option value="${cl.id}" ${s.class_id === cl.id ? 'selected' : ''}>${cl.name}</option>`).join('')}
                    </select>
                    <select id="e-st-gn" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                        <option value="L" ${s.gender === 'L' ? 'selected' : ''}>Laki-laki (L)</option>
                        <option value="P" ${s.gender === 'P' ? 'selected' : ''}>Perempuan (P)</option>
                    </select>
                </div>
                <input type="text" id="e-st-ph" value="${s.parent_phone || ''}" placeholder="No WA (628...)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border border-slate-200 focus:border-[#204258]">
                <button onclick="window.updateStudent('${id}')" class="w-full py-5 bg-[#b89442] text-white rounded-3xl font-black uppercase shadow-xl mt-4">Update Data</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddJournal = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Jurnal Guru";
            b.innerHTML = `<div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="j-date" value="${new Date().toISOString().split('T')[0]}" class="p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                    <input type="number" id="j-meeting" placeholder="Pertemuan Ke-" class="p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                </div>
                <select id="j-teacher" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                    <option value="">Pilih Guru Pengajar</option>
                    ${state.teachers.map(t => `<option value="${t.name}">${t.name} (${t.subject})</option>`).join('')}
                </select>
                <select id="j-class" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                    ${state.classes.map(cl => `<option value="${cl.id}">${cl.name}</option>`).join('')}
                </select>
                <input type="text" id="j-subject" placeholder="Mata Pelajaran" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                <input type="text" id="j-topic" placeholder="Pokok Bahasan / Materi" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#204258] outline-none">
                <textarea id="j-activity" placeholder="Rincian Kegiatan KBM" class="w-full p-4 bg-slate-50 rounded-2xl h-24 border border-slate-200 focus:border-[#204258] outline-none font-medium"></textarea>
                <textarea id="j-absent" placeholder="Catatan Siswa Absen / Kendala Kelas" class="w-full p-4 bg-slate-50 rounded-2xl h-20 border border-slate-200 focus:border-[#204258] outline-none font-medium"></textarea>
                <button onclick="window.saveJournal()" class="w-full py-5 bg-[#204258] text-white rounded-3xl font-black uppercase shadow-xl mt-4 hover:bg-[#1a3648]">Simpan Jurnal</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        window.openAddAchievement = () => {
            const b = document.getElementById('modal-body'); document.getElementById('modal-title').innerText = "Catat Prestasi";
            b.innerHTML = `<div class="space-y-4">
                <select id="a-student" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#b89442] outline-none">
                    ${state.students.map(s => `<option value="${s.id}">${s.name} (${s.classes?.name})</option>`).join('')}
                </select>
                <input type="text" id="a-title" placeholder="Judul Prestasi (Contoh: Juara 1 Tahfidz)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border border-slate-200 focus:border-[#b89442] outline-none">
                <textarea id="a-desc" placeholder="Deskripsi Singkat" class="w-full p-4 bg-slate-50 rounded-2xl h-32 border border-slate-200 focus:border-[#b89442] outline-none font-medium"></textarea>
                <button onclick="window.saveAchievement()" class="w-full py-5 bg-[#b89442] text-white rounded-3xl font-black uppercase shadow-xl mt-4 hover:bg-[#9c7d37]">Simpan Prestasi</button>
            </div>`;
            document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
        };

        document.addEventListener('DOMContentLoaded', () => { 
            window.startDigitalClock();
        });

    </script>
</body>
</html>
